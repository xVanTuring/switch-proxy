<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: vivid blue gradient (network / proxy theme) -->
    <linearGradient id="bg" x1="512" y1="100" x2="512" y2="924" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5AB4FF"/>
      <stop offset="0.55" stop-color="#2E74F0"/>
      <stop offset="1" stop-color="#1A47D6"/>
    </linearGradient>
    <!-- Top sheen for a subtle glassy highlight -->
    <linearGradient id="sheen" x1="512" y1="100" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft white-to-cool-white for the glyph, gives gentle depth -->
    <linearGradient id="glyph" x1="512" y1="388" x2="512" y2="636" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCE9FF"/>
    </linearGradient>
    <filter id="bodyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#0B2C73" flood-opacity="0.38"/>
    </filter>
    <filter id="glyphShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0A2356" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded-rectangle body (Apple "squircle" proportions) with contact shadow -->
  <g filter="url(#bodyShadow)">
    <rect x="100" y="100" width="824" height="824" rx="186" ry="186" fill="url(#bg)"/>
  </g>
  <rect x="100" y="100" width="824" height="824" rx="186" ry="186" fill="url(#sheen)"/>

  <!-- Two opposing arrows = "switch / swap" (matches the menu-bar symbol) -->
  <g filter="url(#glyphShadow)" fill="none" stroke="url(#glyph)" stroke-width="50"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- upper arrow → right -->
    <path d="M372 444 H628"/>
    <path d="M576 392 L636 444 L576 496"/>
    <!-- lower arrow ← left -->
    <path d="M652 580 H396"/>
    <path d="M448 528 L388 580 L448 632"/>
  </g>
</svg>
