name: SwitchProxy
options:
  bundleIdPrefix: tech.xvanturing
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: "NO"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"

targets:
  SwitchProxy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Support/Info.plist
      properties:
        CFBundleName: SwitchProxy
        CFBundleDisplayName: Switch Proxy
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.xvanturing.SwitchProxy
        PRODUCT_NAME: SwitchProxy
