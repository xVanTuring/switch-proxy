name: SwitchProxy
options:
  bundleIdPrefix: tech.xvanturing
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  SwitchProxy:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Support/Info.plist
      properties:
        CFBundleName: SwitchProxy
        CFBundleDisplayName: Switch Proxy
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "4"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.xvanturing.SwitchProxy
        PRODUCT_NAME: SwitchProxy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Local development: ad-hoc signing, hardened runtime off.
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_ALLOWED: "YES"
          ENABLE_HARDENED_RUNTIME: "NO"
        # Distribution: Developer ID (automatic) + hardened runtime for notarization.
        # scripts/release.sh archives Release and re-signs Developer ID on export.
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: T8F5T6HKG8
          ENABLE_HARDENED_RUNTIME: "YES"
